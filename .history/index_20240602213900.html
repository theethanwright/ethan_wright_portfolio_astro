<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage Screenshot</title>
    <style>
        #loading {
            display: none;
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Capture Webpage Screenshot</h1>
    <input type="text" id="url" placeholder="Enter URL">
    <button onclick="captureScreenshot()">Capture Screenshot</button>
    <div id="loading">Loading...</div>
    <div id="result">
        <h2>Screenshot:</h2>
        <img id="screenshot" src="" alt="Screenshot will appear here">
    </div>

    <script>
        async function captureScreenshot() {
            const url = document.getElementById('url').value;
            const loadingElement = document.getElementById('loading');
            const screenshotElement = document.getElementById('screenshot');

            if (!url) {
                alert('Please enter a URL');
                return;
            }

            // Show the loading animation
            loadingElement.style.display = 'block';
            screenshotElement.src = '';

            try {
                const response = await fetch('http://localhost:3000/capture', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url })
                });

                if (response.ok) {
                    const data = await response.json();
                    screenshotElement.src = data.image;
                } else {
                    alert('Error capturing screenshot');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error capturing screenshot');
            } finally {
                // Hide the loading animation
                loadingElement.style.display = 'none';
            }
        }
    </script>
</body>
</html>
