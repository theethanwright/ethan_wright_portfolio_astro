<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple URLs Metadata Parser</title>
</head>
<body>
    <h1>Multiple URLs Metadata Parser</h1>
    
    <ul id="urlList">
        <li>https://example.com/page1</li>
        <li>https://example.com/page2</li>
        <li>https://example.com/page3</li>
        <!-- Add more URLs as needed -->
    </ul>

    <div id="metadataContainer"></div>

    <script>
        async function fetchAndParseMetadata(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                const html = await response.text();

                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;

                const metadata = {};

                const titleElement = tempDiv.querySelector('title');
                metadata.title = titleElement ? titleElement.textContent.trim() : '';

                const descriptionElement = tempDiv.querySelector('meta[name="description"]');
                metadata.description = descriptionElement ? descriptionElement.getAttribute('content') : '';

                const keywordsElement = tempDiv.querySelector('meta[name="keywords"]');
                metadata.keywords = keywordsElement ? keywordsElement.getAttribute('content').split(',') : [];

                return metadata;
            } catch (error) {
                console.error('Error fetching or parsing metadata:', error);
                return null;
            }
        }

        async function fetchAndDisplayMetadataForUrls() {
            const urlListItems = document.querySelectorAll('#urlList li');
            const urls = Array.from(urlListItems).map(item => item.textContent.trim());
            const metadataContainer = document.getElementById('metadataContainer');
            metadataContainer.innerHTML = ''; // Clear previous metadata

            const metadataPromises = urls.map(url => fetchAndParseMetadata(url));
            const metadataResults = await Promise.all(metadataPromises);

            metadataResults.forEach((metadata, index) => {
                const url = urls[index];
                const metadataDiv = document.createElement('div');
                if (metadata) {
                    metadataDiv.innerHTML = `
                        <p><strong>URL:</strong> ${url}</p>
                        <p><strong>Title:</strong> ${metadata.title}</p>
                        <p><strong>Description:</strong> ${metadata.description}</p>
                        <p><strong>Keywords:</strong> ${metadata.keywords.join(', ')}</p>
                    `;
                } else {
                    metadataDiv.textContent = `Failed to fetch metadata for ${url}`;
                }
                metadataContainer.appendChild(metadataDiv);
            });
        }

        fetchAndDisplayMetadataForUrls();
    </script>
</body>
</html>
